name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes) to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 24 bundles npm 11, matching the npm that maintains package-lock.json
      # locally. npm 10 (Node 22) rejects the lockfile shape npm 11 produces for
      # wasm optional deps (@emnapi/*) — "Missing ... from lock file" on npm ci.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Firebase client config is read from VITE_* env at build time; it is
      # optional (the app degrades gracefully without it) so the build runs
      # without secrets purely to verify it compiles and bundles.
      - name: Build
        run: npm run build
