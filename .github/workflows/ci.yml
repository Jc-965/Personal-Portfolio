name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes) to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Node 24 matches Vercel's default runtime. If npm ci dies here with
      # "Missing @emnapi/* from lock file", the lockfile was regenerated by an
      # npm older than ~11.18, which wrongly prunes wasm optional-dep entries
      # (npm/cli bug). Fix: upgrade local npm, then `npm install --package-lock-only`
      # in a clean checkout (no node_modules) and commit the result.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Firebase client config is read from VITE_* env at build time; it is
      # optional (the app degrades gracefully without it) so the build runs
      # without secrets purely to verify it compiles and bundles.
      - name: Build
        run: npm run build

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Browser and accessibility tests
        run: npm run test:e2e -- --project=chromium
